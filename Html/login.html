<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PermitPro — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../Web/wwwroot/lib/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="css/admin.css" rel="stylesheet">
    <style>
        body { background: transparent; }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <div style="width:64px;height:64px;background:linear-gradient(135deg,#2c7be5,#5a9cf5);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                <i class="fa-solid fa-helmet-safety fa-xl" style="color:#fff;"></i>
            </div>
            <div class="logo-text">PermitPro</div>
            <div class="logo-sub">Permit-to-Work Management System</div>
        </div>

        <h5 class="mb-1 fw-600" style="font-size:.95rem;color:#1a2b4a;">Welcome back</h5>
        <p class="text-muted mb-4" style="font-size:.8rem;">Sign in to continue to your dashboard</p>

        <form action="dashboard.html" method="GET">
            <!-- Company -->
            <div class="mb-3">
                <label class="form-label">Company</label>
                <select class="form-select">
                    <option value="">Select your company…</option>
                    <option selected>ThinkVisor Sdn Bhd</option>
                    <option>Petronas Carigali</option>
                    <option>Shell Malaysia</option>
                </select>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <div class="input-group">
                    <span class="input-group-text" style="background:#f8fafc;border-color:#e2e8f0;border-right:none;">
                        <i class="fa-regular fa-envelope" style="color:#a0aec0;font-size:.85rem;"></i>
                    </span>
                    <input type="email" class="form-control" style="border-left:none;padding-left:4px;" placeholder="you@company.com" value="admin@permitpro.app">
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label mb-0">Password</label>
                    <a href="#" style="font-size:.72rem;color:#2c7be5;text-decoration:none;font-weight:500;">Forgot password?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text" style="background:#f8fafc;border-color:#e2e8f0;border-right:none;">
                        <i class="fa-solid fa-lock" style="color:#a0aec0;font-size:.85rem;"></i>
                    </span>
                    <input type="password" class="form-control" style="border-left:none;border-right:none;padding-left:4px;" placeholder="••••••••••••" value="password">
                    <button type="button" class="input-group-text" style="background:#f8fafc;border-color:#e2e8f0;cursor:pointer;" onclick="togglePwd(this)">
                        <i class="fa-regular fa-eye" style="color:#a0aec0;font-size:.85rem;"></i>
                    </button>
                </div>
            </div>

            <!-- Remember me -->
            <div class="mb-4 d-flex align-items-center justify-content-between">
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox" id="remember" checked style="accent-color:#2c7be5;">
                    <label class="form-check-label" for="remember" style="font-size:.8rem;color:#4a5568;font-weight:500;">Remember me for 30 days</label>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100 py-2" style="font-weight:600;font-size:.875rem;letter-spacing:.3px;border-radius:10px;">
                <i class="fa-solid fa-arrow-right-to-bracket me-2"></i> Sign In
            </button>

            <!-- Divider -->
            <div class="d-flex align-items-center gap-2 my-4">
                <hr class="flex-grow-1 m-0" style="border-color:#e2e8f0;">
                <span style="font-size:.72rem;color:#a0aec0;white-space:nowrap;">or continue with</span>
                <hr class="flex-grow-1 m-0" style="border-color:#e2e8f0;">
            </div>

            <!-- SSO placeholder -->
            <button type="button" class="btn btn-light w-100 py-2 d-flex align-items-center justify-content-center gap-2" style="border-radius:10px;font-size:.825rem;">
                <i class="fa-brands fa-microsoft" style="color:#2c7be5;"></i>
                <span>Microsoft Azure AD</span>
            </button>
        </form>

        <p class="text-center mt-4 mb-0" style="font-size:.72rem;color:#a0aec0;">
            Protected by PermitPro&nbsp;&bull;&nbsp;v1.2
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(btn) {
    const inp = btn.closest('.input-group').querySelector('input[type="password"], input[type="text"]');
    const icon = btn.querySelector('i');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'fa-regular fa-eye';
    }
}
</script>
</body>
</html>
